name: Bug report
description: 报告可复现的问题
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 发生了什么？期望发生什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 选择...
        3. 点击...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 浏览器、Node.js 版本、操作系统或部署方式
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 日志或截图
      description: 请删除 API Key、Cookie、密码和其他敏感信息。
