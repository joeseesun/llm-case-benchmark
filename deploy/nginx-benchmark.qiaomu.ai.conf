server {
    listen 80;
    server_name benchmark.qiaomu.ai;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/benchmark.qiaomu.ai;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    access_log /www/wwwlogs/benchmark.qiaomu.ai.log;
    error_log /www/wwwlogs/benchmark.qiaomu.ai.error.log;
}

server {
    listen 443 ssl;
    http2 on;
    server_name benchmark.qiaomu.ai;

    ssl_certificate /etc/letsencrypt/live/benchmark.qiaomu.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/benchmark.qiaomu.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:EECDH+AES256:RSA+AES128:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 4m;

    location = /healthz {
        proxy_pass http://127.0.0.1:3168/healthz;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3168;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    access_log /www/wwwlogs/benchmark.qiaomu.ai.log;
    error_log /www/wwwlogs/benchmark.qiaomu.ai.error.log;
}
